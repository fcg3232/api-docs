<!DOCTYPE html>
<html>
<head>
  <title>SecondaryDAO API - Full Guide</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      color: #1a1a2e;
      line-height: 1.7;
    }
    a { color: #3182ce; }
    .back-link { margin-bottom: 30px; display: block; }
    h1 { font-size: 2rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; margin-bottom: 24px; }
    h2 { font-size: 1.5rem; margin-top: 48px; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; }
    h3 { font-size: 1.2rem; margin-top: 32px; }
    code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.9rem; }
    pre { background: #1a1a2e; color: #e2e8f0; padding: 20px; border-radius: 8px; overflow-x: auto; }
    pre code { background: none; padding: 0; color: inherit; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; }
    th { background: #f8f9fc; font-weight: 600; }
    blockquote { border-left: 3px solid #3182ce; padding-left: 16px; color: #4a5568; margin: 16px 0; }
    hr { border: none; border-top: 1px solid #e2e8f0; margin: 40px 0; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">&larr; Back to API Reference</a>
  <div id="content">Loading...</div>
  <script>
    fetch('guide.md')
      .then(r => r.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById('content').innerHTML = '<p>Failed to load guide. <a href="guide.md">View raw markdown</a>.</p>';
      });
  </script>
</body>
</html>
